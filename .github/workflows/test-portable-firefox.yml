name: Test Firefox Portable Addon

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test-addon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Firefox ESR
        run: |
          curl -L -o /tmp/firefox-esr.tar.xz "https://download.mozilla.org/?product=firefox-esr-latest&os=linux64&lang=en-US"
          mkdir -p firefox-portable
          tar -xJf /tmp/firefox-esr.tar.xz -C firefox-portable/

      - name: Setup config files
        run: |
          PORTABLE_DIR="$(pwd)/firefox-portable"
          FIREFOX_DIR="$PORTABLE_DIR/firefox"

          # autoconfig.js
          mkdir -p "$FIREFOX_DIR/defaults/pref"
          cat > "$FIREFOX_DIR/defaults/pref/autoconfig.js" << 'EOF'
          pref("general.config.filename", "autoconfig.cfg");
          pref("general.config.obscure_value", 0);
          EOF

          # autoconfig.cfg
          cat > "$FIREFOX_DIR/autoconfig.cfg" << 'EOF'
          // First line must be a comment
          defaultPref("xpinstall.signatures.required", false);
          defaultPref("extensions.langpacks.signatures.required", false);
          EOF

          # Package addon as XPI
          mkdir -p "$PORTABLE_DIR/extensions"
          cd "$GITHUB_WORKSPACE"
          zip -r "$PORTABLE_DIR/extensions/serp-puller@botxbyte.com.xpi" . \
            -x '.git/*' '.github/*' '*.DS_Store' 'firefox-portable/*'

          # policies.json
          mkdir -p "$FIREFOX_DIR/distribution"
          cat > "$FIREFOX_DIR/distribution/policies.json" << EOF
          {
            "policies": {
              "Extensions": {
                "Install": ["$PORTABLE_DIR/extensions/serp-puller@botxbyte.com.xpi"]
              },
              "DisableAppUpdate": true,
              "DontCheckDefaultBrowser": true
            }
          }
          EOF

          # Create profile
          mkdir -p "$PORTABLE_DIR/profile"

      - name: Verify XPI contents
        run: |
          echo "=== XPI file size ==="
          ls -lh firefox-portable/extensions/serp-puller@botxbyte.com.xpi
          echo ""
          echo "=== XPI contains manifest.json ==="
          unzip -l firefox-portable/extensions/serp-puller@botxbyte.com.xpi | grep manifest.json
          echo ""
          echo "=== Integrity check ==="
          unzip -t firefox-portable/extensions/serp-puller@botxbyte.com.xpi > /dev/null && echo "OK: No errors"

      - name: Test Firefox launches and loads addon
        run: |
          PORTABLE_DIR="$(pwd)/firefox-portable"
          export DISPLAY=:99
          sudo apt-get install -y xvfb > /dev/null 2>&1
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2

          # Launch Firefox with profile in background
          "$PORTABLE_DIR/firefox/firefox" --profile "$PORTABLE_DIR/profile" --headless --no-remote &
          FIREFOX_PID=$!

          # Poll up to 60s for the addon to be installed by the policy.
          # The most reliable signal is the installed XPI landing in profile/extensions/,
          # or the addon ID appearing in extensions.json once it's written.
          echo "=== Waiting for addon installation ==="
          INSTALLED=0
          for i in $(seq 1 30); do
            if find "$PORTABLE_DIR/profile/extensions" -iname "serp-puller@botxbyte.com*" 2>/dev/null | grep -q .; then
              echo "✅ Addon XPI installed in profile/extensions (after ${i}x2s)"
              INSTALLED=1
              break
            fi
            if [ -s "$PORTABLE_DIR/profile/extensions.json" ] && grep -q "serp-puller" "$PORTABLE_DIR/profile/extensions.json" 2>/dev/null; then
              echo "✅ Addon registered in extensions.json (after ${i}x2s)"
              INSTALLED=1
              break
            fi
            sleep 2
          done

          kill $FIREFOX_PID 2>/dev/null || true
          sleep 1

          echo ""
          echo "=== Verifying addon state in extensions.json ==="
          if [ -s "$PORTABLE_DIR/profile/extensions.json" ]; then
            cat > /tmp/check_addon.py <<'PY'
          import sys, json
          path = sys.argv[1]
          try:
              with open(path) as f:
                  data = json.load(f)
          except (ValueError, OSError) as e:
              print("Could not parse extensions.json:", e)
              sys.exit(1)
          addons = data.get('addons', [])
          found = [a for a in addons if 'serp-puller' in (a.get('id') or '')]
          if found:
              a = found[0]
              print("Addon found:", a.get('id'), "| active:", a.get('active'), "| location:", a.get('location'))
          else:
              print("Addon NOT found in extensions.json")
              print("Registered addons:", [a.get('id') for a in addons])
              sys.exit(1)
          PY
            python3 /tmp/check_addon.py "$PORTABLE_DIR/profile/extensions.json"
          elif [ "$INSTALLED" = "1" ]; then
            echo "Addon XPI present in profile (extensions.json not yet flushed, but install confirmed)"
          else
            echo "Addon was not installed within timeout. Diagnostics:"
            echo "--- profile contents ---"
            ls -la "$PORTABLE_DIR/profile" || true
            ls -la "$PORTABLE_DIR/profile/extensions" 2>/dev/null || echo "(no extensions dir)"
            exit 1
          fi

      - name: Upload portable bundle
        uses: actions/upload-artifact@v4
        with:
          name: firefox-portable-bundle
          path: |
            firefox-portable/extensions/serp-puller@botxbyte.com.xpi
            firefox-portable/firefox/autoconfig.cfg
            firefox-portable/firefox/defaults/pref/autoconfig.js
            firefox-portable/firefox/distribution/policies.json
